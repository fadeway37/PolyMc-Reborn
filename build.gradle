def releaseDirectory = layout.buildDirectory.dir('release')
def releaseMetadataDirectory = layout.buildDirectory.dir('reports/release-artifacts')
def sbomFile = releaseMetadataDirectory.map {
	it.file("polymc-reborn-${project.version}-cyclonedx.json")
}
def provenanceFile = releaseMetadataDirectory.map {
	it.file("polymc-reborn-${project.version}-provenance.json")
}
def buildManifestFile = releaseMetadataDirectory.map {
	it.file("polymc-reborn-${project.version}-build-manifest.json")
}
def checksumsFile = releaseMetadataDirectory.map { it.file('SHA256SUMS') }
def checksums512File = releaseMetadataDirectory.map { it.file('SHA512SUMS') }
def apiJarFile = project(':api').tasks.named('jar', Jar).flatMap { it.archiveFile }
def apiSourcesJarFile = project(':api').tasks.named('sourcesJar', Jar).flatMap { it.archiveFile }
def apiJavadocJarFile = project(':api').tasks.named('javadocJar', Jar).flatMap { it.archiveFile }

def sha256Of = { File source ->
	def digest = java.security.MessageDigest.getInstance('SHA-256')
	source.withInputStream { input ->
		def buffer = new byte[8192]
		for (int read = input.read(buffer); read >= 0; read = input.read(buffer)) {
			if (read > 0) digest.update(buffer, 0, read)
		}
	}
	java.util.HexFormat.of().formatHex(digest.digest())
}

def sha512Of = { File source ->
	def digest = java.security.MessageDigest.getInstance('SHA-512')
	source.withInputStream { input ->
		def buffer = new byte[8192]
		for (int read = input.read(buffer); read >= 0; read = input.read(buffer)) {
			if (read > 0) digest.update(buffer, 0, read)
		}
	}
	java.util.HexFormat.of().formatHex(digest.digest())
}

tasks.register('generateSbom') {
	group = 'release'
	description = 'Generates a deterministic CycloneDX 1.5 SBOM from locked runtime artifacts.'
	dependsOn tasks.named('jar')
	outputs.file(sbomFile)
	doLast {
		def components = configurations.runtimeClasspath.resolvedConfiguration.resolvedArtifacts
			.collect { artifact ->
				def id = artifact.moduleVersion.id
				[
					type: 'library', group: id.group, name: id.name, version: id.version,
					'bom-ref': "pkg:maven/${id.group}/${id.name}@${id.version}",
					purl: "pkg:maven/${id.group}/${id.name}@${id.version}",
					hashes: [[alg: 'SHA-256', content: sha256Of(artifact.file)]]
				]
			}.sort { left, right -> left['bom-ref'] <=> right['bom-ref'] }
		def document = [
			bomFormat: 'CycloneDX', specVersion: '1.5', serialNumber: 'urn:uuid:'
				+ java.util.UUID.nameUUIDFromBytes((project.group.toString() + ':'
				+ project.name + ':' + project.version).getBytes('UTF-8')),
			version: 1,
			metadata: [component: [type: 'application', group: project.group.toString(),
				name: project.archives_base_name, version: project.version.toString(),
				'bom-ref': "pkg:maven/${project.group}/${project.archives_base_name}@${project.version}"]],
			components: components
		]
		def output = sbomFile.get().asFile.toPath()
		java.nio.file.Files.createDirectories(output.parent)
		java.nio.file.Files.writeString(output,
			groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(document)) + '\n')
	}
}

tasks.register('generateProvenance') {
	group = 'release'
	description = 'Writes a path-free local build manifest; GitHub attestation is generated only in CI.'
	dependsOn tasks.named('jar'), ':api:jar'
	outputs.files(provenanceFile, buildManifestFile)
	doLast {
		def document = [
			schema_version: 1,
			builder: 'gradle-wrapper', gradle_version: gradle.gradleVersion,
			gradle_runtime_java_feature: Runtime.version().feature(),
			toolchain_java_feature: 25, bytecode_release: 25,
			git_commit: buildGitCommit.get(), git_dirty: buildGitDirty.get().toBoolean(),
			project_version: project.version.toString(), minecraft_version: project.minecraft_version,
			mapping_namespace: 'official',
			artifacts: [
				[name: productionReleaseJar.get().asFile.name,
				 sha256: sha256Of(productionReleaseJar.get().asFile)],
				[name: apiJarFile.get().asFile.name, sha256: sha256Of(apiJarFile.get().asFile)]
			]
		]
		def output = provenanceFile.get().asFile.toPath()
		java.nio.file.Files.createDirectories(output.parent)
		java.nio.file.Files.writeString(output,
			groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(document)) + '\n')
		def manifest = [
			schema_version: 1,
			project: 'PolyMc Reborn', project_version: project.version.toString(),
			minecraft_version: project.minecraft_version, java_release: 25,
			gradle_version: gradle.gradleVersion, mapping_namespace: 'official',
			git_commit: buildGitCommit.get(), git_dirty: buildGitDirty.get().toBoolean(),
			archives: document.artifacts.sort { left, right -> left.name <=> right.name }
		]
		def manifestOutput = buildManifestFile.get().asFile.toPath()
		java.nio.file.Files.writeString(manifestOutput,
			groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(manifest)) + '\n')
	}
}

tasks.register('verifyReleaseArtifacts') {
	group = 'release'
	dependsOn tasks.named('jar'), ':api:jar'
	doLast {
		new java.util.jar.JarFile(productionReleaseJar.get().asFile).withCloseable { archive ->
			def forbidden = archive.entries().findAll { entry ->
				entry.name.contains('/gametest/') || entry.name.contains('/playtest/')
					|| entry.name.contains('/consumer/') || entry.name.endsWith('.jar')
			}.collect { it.name }
			if (!forbidden.isEmpty()) throw new GradleException('Release JAR contains test/consumer content: ' + forbidden)
		}
		new java.util.jar.JarFile(apiJarFile.get().asFile).withCloseable { archive ->
			def forbidden = archive.entries().findAll { entry ->
				entry.name.startsWith('io/github/polymcreborn/backend/')
					|| entry.name.startsWith('io/github/polymcreborn/core/')
					|| entry.name.contains('/tools/') || entry.name.endsWith('.jar')
			}.collect { it.name }
			if (!forbidden.isEmpty()) throw new GradleException('API JAR contains implementation/build tools: ' + forbidden)
		}
	}
}

tasks.register('generateReleaseChecksums') {
	group = 'release'
	dependsOn tasks.named('verifyReleaseArtifacts'), tasks.named('generateSbom'),
		tasks.named('generateProvenance'), tasks.named('sourcesJar'), tasks.named('javadocJar'),
		':api:sourcesJar', ':api:javadocJar'
	outputs.files(checksumsFile, checksums512File)
	doLast {
		def files = [productionReleaseJar.get().asFile,
			tasks.named('sourcesJar', Jar).get().archiveFile.get().asFile,
			tasks.named('javadocJar', Jar).get().archiveFile.get().asFile,
			apiJarFile.get().asFile, apiSourcesJarFile.get().asFile, apiJavadocJarFile.get().asFile,
			sbomFile.get().asFile, provenanceFile.get().asFile, buildManifestFile.get().asFile,
			file('api/signatures/0.4.0-rc.2.txt'), file('LICENSE'), file('NOTICE.md'),
			file('THIRD_PARTY_NOTICES.md'), file('docs/releases/0.4.0-rc.2.md')]
		files.sort { it.name }
		def output = checksumsFile.get().asFile.toPath()
		java.nio.file.Files.createDirectories(output.parent)
		java.nio.file.Files.writeString(output, files.collect {
			sha256Of(it) + '  ' + it.name
		}.join('\n') + '\n')
		def output512 = checksums512File.get().asFile.toPath()
		java.nio.file.Files.writeString(output512, files.collect {
			sha512Of(it) + '  ' + it.name
		}.join('\n') + '\n')
	}
}

tasks.register('assembleRcArtifacts', Copy) {
	group = 'release'
	description = 'Assembles the bounded RC artifact set without publishing it.'
	dependsOn tasks.named('generateReleaseChecksums')
	from productionReleaseJar
	from tasks.named('sourcesJar', Jar).flatMap { it.archiveFile }
	from tasks.named('javadocJar', Jar).flatMap { it.archiveFile }
	from apiJarFile
	from apiSourcesJarFile
	from apiJavadocJarFile
	from sbomFile
	from provenanceFile
	from buildManifestFile
	from checksumsFile
	from checksums512File
	from file('api/signatures/0.4.0-rc.2.txt')
	from file('LICENSE')
	from file('NOTICE.md')
	from file('THIRD_PARTY_NOTICES.md')
	from file('docs/releases/0.4.0-rc.2.md')
	into releaseDirectory
	outputs.upToDateWhen { false }
	doFirst {
		delete releaseDirectory
	}
	doLast {
		def expected = [
			productionReleaseJar.get().asFile.name,
			tasks.named('sourcesJar', Jar).get().archiveFile.get().asFile.name,
			tasks.named('javadocJar', Jar).get().archiveFile.get().asFile.name,
			apiJarFile.get().asFile.name, apiSourcesJarFile.get().asFile.name,
			apiJavadocJarFile.get().asFile.name, sbomFile.get().asFile.name,
			provenanceFile.get().asFile.name, buildManifestFile.get().asFile.name,
			checksumsFile.get().asFile.name, checksums512File.get().asFile.name,
			'0.4.0-rc.2.txt', 'LICENSE', 'NOTICE.md', 'THIRD_PARTY_NOTICES.md',
			'0.4.0-rc.2.md'
		].toSorted()
		def actual = releaseDirectory.get().asFile.listFiles().findAll { it.isFile() }
			.collect { it.name }.toSorted()
		if (actual != expected) {
			throw new GradleException('RC artifact set differs from the exact allow-list: ' + actual)
		}
		def empty = releaseDirectory.get().asFile.listFiles().findAll { it.isFile() && it.length() == 0 }
			.collect { it.name }
		if (!empty.isEmpty()) {
			throw new GradleException('RC artifact set contains empty files: ' + empty)
		}
	}
}

