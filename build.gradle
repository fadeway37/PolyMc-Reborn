		def source = layout.buildDirectory.dir('playtest/single-client').get().asFile
		def target = layout.buildDirectory.dir('playtest/api-consumer').get().asFile
		if (!source.isDirectory()) {
			throw new GradleException('Single-client evidence is missing; API consumer evidence cannot be materialized')
		}
		delete target
		copy {
			from source
			into target
		}
		def summary = new groovy.json.JsonSlurper().parse(new File(target, 'server-state.json'))
		if (summary.api_consumer_loaded != true) {
			throw new GradleException('Production server did not load the independent API consumer')
		}
	}
