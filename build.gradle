def playtestReportDirectory = providers.gradleProperty('playtestReportDir')
	.map { new File(it).absoluteFile }
	.orElse(layout.buildDirectory.dir('reports/client-playtest').map { it.asFile })
def productionReleaseJar = tasks.named('jar', Jar).flatMap { it.archiveFile }
def productionJarNameArgument = productionReleaseJar.map { archive ->
	'-Dpolymc-reborn.playtest.productionJarName=' + archive.asFile.name
}
def productionJarSha256Argument = productionReleaseJar.map { archive ->
	def digest = java.security.MessageDigest.getInstance('SHA-256')
	archive.asFile.withInputStream { input ->
		def buffer = new byte[8192]
		for (int read = input.read(buffer); read >= 0; read = input.read(buffer)) {
			if (read > 0) {
				digest.update(buffer, 0, read)
			}
		}
	}
	'-Dpolymc-reborn.playtest.productionJarSha256=' + java.util.HexFormat.of().formatHex(digest.digest())
}
def productionArtifactReport = layout.buildDirectory.file('reports/release/production-artifact.txt')
def apiConsumerDirectory = layout.projectDirectory.dir('playtest/api-consumer')
def apiConsumerJar = apiConsumerDirectory.file(
	'build/libs/polymc-reborn-api-consumer-' + project.version + '.jar')
def playtestApiConsumerJar = providers.gradleProperty('playtestApiConsumerJar')
def selectedApiConsumerJar = playtestApiConsumerJar.map { file(it) }
	.orElse(providers.provider { apiConsumerJar.asFile })

tasks.register('verifyProductionArtifactSemantics') {
	group = 'verification'
	description = 'Verifies that the official-named Loom output is the final Java 25 production artifact.'
	dependsOn tasks.named('jar')
	inputs.file(productionReleaseJar)
	outputs.file(productionArtifactReport)
	doLast {
		def loomExtension = project.extensions.getByName('loom')
		if (!loomExtension.dontRemapOutputs()) {
			throw new GradleException('Expected official-named Loom output with dontRemapOutputs enabled')
		}
		if (tasks.findByName('remapJar') != null) {
			throw new GradleException('Unexpected remapJar task: official Minecraft names must ship directly')
		}

		def releaseJar = productionReleaseJar.get().asFile
		if (releaseJar.name.contains('-dev') || releaseJar.name.contains('-sources')
				|| releaseJar.name.contains('-javadoc')) {
			throw new GradleException('Production artifact uses a non-distributable classifier: '
				+ releaseJar.name)
		}

		def classCount = 0
		def metadata
		def mappingNamespace
		new java.util.jar.JarFile(releaseJar).withCloseable { archive ->
			mappingNamespace = archive.manifest?.mainAttributes
				?.getValue('Fabric-Mapping-Namespace')
			def metadataEntry = archive.getJarEntry('fabric.mod.json')
			if (metadataEntry == null) {
				throw new GradleException('Production artifact has no fabric.mod.json')
			}
			metadata = new groovy.json.JsonSlurper().parse(archive.getInputStream(metadataEntry))
			archive.entries().each { entry ->
				if (!entry.directory && entry.name.endsWith('.class')) {
					classCount++
					archive.getInputStream(entry).withCloseable { input ->
						def header = input.readNBytes(8)
						def validHeader = header.length == 8
							&& header[0] == (byte) 0xCA && header[1] == (byte) 0xFE
							&& header[2] == (byte) 0xBA && header[3] == (byte) 0xBE
						def major = validHeader
							? java.nio.ByteBuffer.wrap(header).getShort(6) & 0xffff
							: -1
						if (major != 69) {
							throw new GradleException('Production class is not Java 25 major 69: '
								+ entry.name + ' (major ' + major + ')')
						}
					}
				}
			}
		}
		if (classCount == 0) {
			throw new GradleException('Production artifact contains no Java classes')
		}
		if (mappingNamespace != 'official') {
			throw new GradleException('Production artifact mapping namespace is '
				+ mappingNamespace + '; expected official')
		}
		if (metadata.id != 'polymc-reborn' || metadata.version != project.version.toString()
				|| metadata.environment != 'server') {
			throw new GradleException('Production artifact has unexpected Fabric metadata')
		}
		def artifactSha256 = productionJarSha256Argument.get().split('=', 2)[1]

		def reportFile = productionArtifactReport.get().asFile.toPath()
		java.nio.file.Files.createDirectories(reportFile.parent)
		java.nio.file.Files.writeString(reportFile,
			'artifact=' + releaseJar.name + '\n'
				+ 'loom_dont_remap_outputs=true\n'
				+ 'remap_task_present=false\n'
				+ 'mapping_namespace=official\n'
				+ 'class_major=69\n'
				+ 'class_count=' + classCount + '\n'
				+ 'sha256=' + artifactSha256 + '\n')
	}
}

tasks.named('check') {
	dependsOn tasks.named('verifyProductionArtifactSemantics')
}

