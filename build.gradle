	.map { new File(it).absoluteFile }
	.orElse(layout.buildDirectory.file('upgrade-playtest/stop.request').map { it.asFile })
def upgradeServerPort = providers.gradleProperty('upgradeServerPort').orElse('25579')
def upgradePackPort = providers.gradleProperty('upgradePackPort').orElse('25580')

tasks.register('prepareUpgradeFixtureServer') {
	outputs.upToDateWhen { false }
	doLast {
		def directory = layout.buildDirectory.dir('run/upgrade-server').get().asFile.toPath()
		java.nio.file.Files.createDirectories(directory)
		java.nio.file.Files.writeString(directory.resolve('eula.txt'), 'eula=true\n')
		java.nio.file.Files.writeString(directory.resolve('server.properties'),
			'online-mode=false\nserver-ip=127.0.0.1\nserver-port=' + upgradeServerPort.get()
				+ '\ngenerate-structures=false\nlevel-seed=PolyMc-Reborn-upgrade-playtest\n'
				+ 'spawn-protection=0\nview-distance=5\nsimulation-distance=5\nmax-tick-time=0\n')
	}
}

tasks.register('runUpgradeFixtureServer', net.fabricmc.loom.task.prod.ServerProductionRunTask) {
	group = 'verification'
	description = 'Internal production-server leg for 0.3-Beta-to-0.4-RC upgrade evidence.'
	dependsOn tasks.named('upgradeFixtureJar'), tasks.named('prepareUpgradeFixtureServer')
	mods.setFrom(configurations.productionRuntimeMods, upgradeRebornJar.map { file(it) },
		tasks.named('upgradeFixtureJar').flatMap { it.archiveFile })
	if (upgradeExpanded.get().toBoolean()) {
		dependsOn tasks.named('upgradeExpansionFixtureJar')
		mods.from(tasks.named('upgradeExpansionFixtureJar').flatMap { it.archiveFile })
	}
	runDir = layout.buildDirectory.dir('run/upgrade-server')
	programArgs.add('--nogui')
	jvmArgs.add(upgradeMode.map { '-Dpolymc-reborn.upgrade.mode=' + it })
	jvmArgs.add(upgradeExpanded.map { '-Dpolymc-reborn.upgrade.expanded=' + it })
	jvmArgs.add(upgradeReport.map { '-Dpolymc-reborn.upgrade.report=' + it.absolutePath })
	jvmArgs.add(upgradeStopFile.map { '-Dpolymc-reborn.upgrade.stopFile=' + it.absolutePath })
	jvmArgs.add(upgradeRebornJar.map { '-Dpolymc-reborn.upgrade.rebornJar=' + file(it).absolutePath })
	jvmArgs.add(upgradePackPort.map { '-Dpolymc-reborn.upgrade.packPort=' + it })
	doFirst {
		def exact = mods.files.collect { it.canonicalFile }.sort { it.name }
		def requested = file(upgradeRebornJar.get()).canonicalFile
		if (!exact.contains(requested)) {
			throw new GradleException('Upgrade server Mod path does not contain the requested production JAR')
		}
		def rebornCandidates = exact.findAll { it.name.startsWith('polymc-reborn-')
			&& !it.name.contains('upgrade-fixture') && !it.name.contains('upgrade-expansion-fixture') }
		if (rebornCandidates != [requested]) {
			throw new GradleException('Upgrade server has ambiguous Reborn artifacts: ' + rebornCandidates)
		}
		logger.lifecycle('Upgrade server exact Mod files: {}', exact.collect { it.name })
	}
}

tasks.register('prepareProductionServerPlaytest') {
	inputs.property('playtestServerPort', playtestServerPort)
	inputs.property('playtestPackPort', playtestPackPort)
	inputs.property('playtestPackPolicy', playtestPackPolicy)
	outputs.upToDateWhen { false }
	outputs.files(playtestServerDirectory.map { directory -> [
		directory.file('eula.txt').asFile,
		directory.file('server.properties').asFile
	] })
	doLast {
		def directory = playtestServerDirectory.get().asFile.toPath().toAbsolutePath().normalize()
		def safeRunRoot = playtestServerRunRoot.get().asFile.toPath().toAbsolutePath().normalize()
		def expectedDirectory = safeRunRoot.resolve('client-playtest-server').normalize()
		if (!directory.startsWith(safeRunRoot) || directory.equals(safeRunRoot)
				|| !directory.equals(expectedDirectory)) {
			throw new GradleException('Refusing to prepare unexpected playtest server directory: '
				+ directory)
		}
		delete directory.toFile()
		java.nio.file.Files.createDirectories(directory)
		java.nio.file.Files.writeString(directory.resolve('eula.txt'), 'eula=true\n')
		java.nio.file.Files.writeString(directory.resolve('server.properties'),
			'online-mode=false\nserver-ip=127.0.0.1\nserver-port=' + playtestServerPort.get()
				+ '\nlevel-seed=PolyMc-Reborn-0.3-playtest\ngenerate-structures=false\n'
				+ 'max-players=2\nspawn-animals=false\nspawn-monsters=false\nspawn-npcs=false\n'
				+ 'difficulty=normal\n'
				+ 'spawn-protection=0\nview-distance=5\nsimulation-distance=5\n'
				+ 'enable-command-block=false\nmax-tick-time=0\npause-when-empty-seconds=-1\n'
				+ 'motd=PolyMc Reborn isolated client playtest\n')
		def policy = playtestPackPolicy.get()
		if (!['REQUIRED', 'OPTIONAL', 'DISABLED'].contains(policy)) {
			throw new GradleException('playtestPackPolicy must be REQUIRED, OPTIONAL, or DISABLED')
		}
		def configDirectory = directory.resolve('config/polymc-reborn')
		java.nio.file.Files.createDirectories(configDirectory)
		java.nio.file.Files.writeString(configDirectory.resolve('config.json'),
			groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson([
				schema_version: 1, enabled: true, generate_resource_pack: true,
				resource_pack_policy: policy, persistent_mappings: true, safe_mode: true,
				log_decision_chains: true, packet_fallback_enabled: false,
				creative_reverse_mapping_enabled: false, override_native_polymer: false,
				report_formats: ['json', 'markdown'],
				cache_limits: [max_entries: 4096, max_bytes: 67108864],
				resource_extraction_limits: [max_files: 10000,
					max_single_file_bytes: 8388608, max_total_bytes: 268435456]
			])) + '\n')
	}
}

tasks.register('assemblePlaytestServer') {
	group = 'verification'
	description = 'Builds the production JAR, server fixture JAR, and fresh isolated server configuration.'
	dependsOn tasks.named('verifyProductionArtifactSemantics'), tasks.named('playtestFixturesJar'),
		tasks.named('prepareProductionServerPlaytest')
}

tasks.register('runProductionServerPlaytest', net.fabricmc.loom.task.prod.ServerProductionRunTask) {
	dependsOn tasks.named('verifyProductionArtifactSemantics'), tasks.named('playtestFixturesJar'),
		tasks.named('prepareProductionServerPlaytest')
	if (!playtestApiConsumerJar.isPresent()) {
		dependsOn 'buildApiConsumer'
	}
	mods.setFrom(productionReleaseJar, configurations.named('productionRuntimeMods'),
		tasks.named('playtestFixturesJar').flatMap { it.archiveFile }, selectedApiConsumerJar)
	if (playtestExternalModJar.isPresent()) {
		mods.from(file(playtestExternalModJar.get()))
	}
	runDir = playtestServerDirectory
	programArgs.add('--nogui')
	jvmArgs.add('-Dpolymc-reborn.playtest.enabled=true')
	jvmArgs.add(playtestMode.map { '-Dpolymc-reborn.playtest.mode=' + it })
	jvmArgs.add(productionJarNameArgument)
	jvmArgs.add(productionJarSha256Argument)
	jvmArgs.add('-Dpolymc-reborn.playtest.stopFile=' + playtestServerDirectory.get()
		.file('stop.request').asFile.absolutePath)
	jvmArgs.add('-Dpolymc-reborn.playtest.readyFile=' + playtestServerDirectory.get()
		.file('server-ready.json').asFile.absolutePath)
	jvmArgs.add('-Dpolymc-reborn.playtest.reportDir=' + playtestReportDirectory.get().absolutePath)
	jvmArgs.add(playtestPackPort.map { '-Dpolymc-reborn.playtest.packPort=' + it })
	jvmArgs.add(playtestExternalMode.map { '-Dpolymc-reborn.playtest.externalMode=' + it })
	jvmArgs.add(playtestExternalModId.map { '-Dpolymc-reborn.playtest.externalModId=' + it })
	jvmArgs.add(playtestExternalItemId.map { '-Dpolymc-reborn.playtest.externalItemId=' + it })
	jvmArgs.add(playtestExternalBlockId.map { '-Dpolymc-reborn.playtest.externalBlockId=' + it })
	jvmArgs.add(playtestSoakMode.map { '-Dpolymc-reborn.playtest.soakMode=' + it })
	doFirst {
		def expectedReleaseJar = productionReleaseJar.get().asFile.canonicalFile
		def matchingReleaseJars = mods.files.findAll { candidate ->
			candidate.canonicalFile == expectedReleaseJar
		}
		if (matchingReleaseJars.size() != 1) {
			throw new GradleException('Production playtest must load exactly one release JAR; found '
				+ matchingReleaseJars.size())
		}
		def unexpectedProjectJars = mods.files.findAll { candidate ->
			candidate.parentFile?.canonicalFile == expectedReleaseJar.parentFile?.canonicalFile
				&& candidate.canonicalFile != expectedReleaseJar
				&& candidate.name.startsWith(project.archives_base_name + '-')
		}
		if (!unexpectedProjectJars.isEmpty()) {
			throw new GradleException('Production playtest contains duplicate project JARs: '
				+ unexpectedProjectJars.collect { it.name }.sort().join(', '))
		}
	}
}

def playtestEvidenceDirectory = layout.buildDirectory.dir('playtest')
def clientDriverProject = project(':playtest:client-driver')

tasks.register('publishApiToTestRepository') {
	group = 'verification'
	description = 'Publishes the standalone Beta API artifact into a bounded temporary Maven repository.'
	dependsOn ':api:publishMavenJavaPublicationToTestRepositoryRepository'
}

tasks.register('buildApiConsumer', Exec) {
	group = 'verification'
	description = 'Builds the external API consumer only from its Maven coordinate.'
	dependsOn tasks.named('publishApiToTestRepository')
	workingDir rootDir
	def repositoryPath = layout.buildDirectory.dir('test-maven-repository').get().asFile.absolutePath
	def arguments = ['-p', apiConsumerDirectory.asFile.absolutePath, 'clean', 'build',
		'--no-daemon', '-PapiRepository=' + repositoryPath]
	if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
		commandLine file('gradlew.bat').absolutePath, *arguments
	} else {
		commandLine file('gradlew').absolutePath, *arguments
	}
	inputs.files(apiConsumerDirectory.file('build.gradle'), apiConsumerDirectory.file('settings.gradle'),
		apiConsumerDirectory.file('gradle.properties'))
	inputs.dir(apiConsumerDirectory.dir('src'))
	outputs.file(apiConsumerJar)
}

tasks.register('cleanPlaytest', Delete) {
	group = 'verification'
	description = 'Deletes only generated isolated-client playtest runs and evidence.'
	delete playtestEvidenceDirectory
	delete layout.buildDirectory.dir('run/client-playtest-evidence-input')
	delete layout.buildDirectory.dir('reports/client-playtest')
	delete playtestServerDirectory
	delete clientDriverProject.layout.buildDirectory.dir('run/client-playtest')
}

