name: Cross-platform archive reproducibility

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-archives:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            label: linux
          - os: windows-2025
            label: windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.vfs.watch=false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: {fetch-depth: 0, persist-credentials: false}
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with: {distribution: temurin, java-version: '25'}
      - uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Build all distributable archives on Linux
        if: runner.os == 'Linux'
        run: ./gradlew --no-daemon clean jar sourcesJar javadocJar :api:jar :api:sourcesJar :api:javadocJar
      - name: Build all distributable archives on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\gradlew.bat --no-daemon clean jar sourcesJar javadocJar :api:jar :api:sourcesJar :api:javadocJar
      - name: Upload exact archive bytes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reproducibility-${{ matrix.label }}-${{ github.sha }}
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
          path: |
            build/libs/polymc-reborn-*.jar
            api/build/libs/polymc-reborn-api-*.jar

  compare:
    needs: build-archives
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: reproducibility-*-${{ github.sha }}
          path: artifacts
      - name: Compare Windows and Linux bytes
        run: |
          set -euo pipefail
          linux_dir="$(find artifacts -maxdepth 1 -type d -name 'reproducibility-linux-*' -print -quit)"
          windows_dir="$(find artifacts -maxdepth 1 -type d -name 'reproducibility-windows-*' -print -quit)"
          test -n "$linux_dir" && test -n "$windows_dir"
          find "$linux_dir" -type f -name '*.jar' -printf '%f\n' | sort > /tmp/linux-files
          find "$windows_dir" -type f -name '*.jar' -printf '%f\n' | sort > /tmp/windows-files
          diff -u /tmp/linux-files /tmp/windows-files
          mkdir -p reproducibility
          : > reproducibility/SHA256SUMS
          while IFS= read -r name; do
            linux_file="$(find "$linux_dir" -type f -name "$name" -print -quit)"
            windows_file="$(find "$windows_dir" -type f -name "$name" -print -quit)"
            cmp "$linux_file" "$windows_file"
            sha256sum "$linux_file" | sed "s#  .*#  $name#" >> reproducibility/SHA256SUMS
          done < /tmp/linux-files
          printf '{"schema_version":1,"result":"passed","commit":"%s","archive_count":%s}\n' \
            '${{ github.sha }}' "$(wc -l < /tmp/linux-files)" > reproducibility/summary.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reproducibility-result-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: reproducibility/**
