name: Prepare Beta Draft Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Exact beta tag to create after every gate passes
        required: true
        default: v0.3.0-beta.1+26.1.2

permissions:
  contents: write

jobs:
  beta-gates-and-draft:
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.vfs.watch=false
      LIBGL_ALWAYS_SOFTWARE: 'true'
      GALLIUM_DRIVER: llvmpipe
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: {fetch-depth: 0, persist-credentials: true}
      - name: Validate exact beta tag input
        run: test '${{ inputs.tag }}' = 'v0.3.0-beta.1+26.1.2'
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with: {distribution: temurin, java-version: '25'}
      - uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Install headless client libraries
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes xvfb xauth libasound2t64 libgl1 libgl1-mesa-dri libglx-mesa0 libopenal1 libx11-6 libx11-xcb1 libxcursor1 libxext6 libxi6 libxinerama1 libxkbcommon0 libxrandr2 libxrender1 libxtst6 libxxf86vm1
      - name: Run non-graphical gates
        run: ./gradlew --no-daemon --stacktrace clean build test checkApiSignature publishApiToTestRepository buildApiConsumer runGameTest runDedicatedServerSmoke runUpgradePlaytest runModSetExpansionPlaytest assembleBetaArtifacts verifyReleaseArtifacts verifyReproducibleArchives
      - name: Run production client gates
        run: xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24 -nolisten tcp' ./gradlew --no-daemon --stacktrace runProductionClientPlaytest runProductionMultiClientPlaytest runPackPolicyPlaytest runExternalModMatrix
      - name: Create annotated tag and draft only after all P0 gates
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -a '${{ inputs.tag }}' -m 'PolyMc Reborn 0.3.0 Beta 1 for Minecraft 26.1.2'
          git push origin '${{ inputs.tag }}'
          gh release create '${{ inputs.tag }}' --draft --verify-tag --title 'PolyMc Reborn 0.3.0 Beta 1' --notes-file docs/0.3-release-notes.md build/release/*
      - name: Upload gate evidence on success or failure
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: beta-gates-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            build/release/**
            build/playtest/**
            build/playtest/multi-client/**
            build/playtest/pack-policy/**
            build/playtest/upgrade/**
            build/playtest/modset-expansion/**
            build/playtest/external-mods/**
            !**/*.jar.tmp
            !**/world/**
