name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: CI
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.daemon=false
        -Dorg.gradle.parallel=false
        -Dorg.gradle.vfs.watch=false

    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Eclipse Temurin 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Validate the Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Set up Gradle dependency cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}

      - name: Verify Java runtime
        run: java -version

      - name: Run repository policy checks
        run: |
          bash .github/scripts/check-public-surface.sh
          bash scripts/ci/check-repository.sh

      - name: Clean build
        run: ./gradlew --no-daemon --stacktrace clean build

      - name: Run unit tests explicitly
        run: ./gradlew --no-daemon --stacktrace test

      - name: Verify standalone API and independent consumer
        run: ./gradlew --no-daemon --stacktrace checkApiSignature publishApiToTestRepository buildApiConsumer

      - name: Run Fabric GameTests
        run: timeout --signal=TERM --kill-after=30s 15m ./gradlew --no-daemon --stacktrace runGameTest

      - name: Run dedicated-server smoke test
        run: timeout --signal=TERM --kill-after=30s 10m ./gradlew --no-daemon --stacktrace runDedicatedServerSmoke

      - name: Verify dedicated-server startup log
        run: bash scripts/ci/check-server-smoke.sh

      - name: Inspect distributable JAR
        run: bash scripts/ci/check-release-jar.sh

      - name: Assemble and inspect RC supply-chain artifacts
        run: ./gradlew --no-daemon --stacktrace assembleRcArtifacts verifyReleaseArtifacts

      - name: Verify build did not modify tracked inputs
        run: bash scripts/ci/check-repository.sh --working-tree

      - name: Upload distributable JAR
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: polymc-reborn-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
          path: |
            build/libs/*.jar
            api/build/libs/*.jar
            build/release/**

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: diagnostics-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 7
          path: |
            build/reports/**
            build/run/gameTest/logs/**
            build/server-smoke/logs/**

  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify repository and public surfaces
        run: |
          bash .github/scripts/check-public-surface.sh
          bash scripts/ci/check-repository.sh
          bash scripts/ci/check-repository.sh --working-tree

  api-signature:
    name: API signature
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.vfs.watch=false
    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Eclipse Temurin 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '25'
      - name: Validate the Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Set up Gradle dependency cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Verify accepted and stable API signatures
        run: ./gradlew --no-daemon --stacktrace checkApiSignature checkApiCompatibility

  dedicated-server-smoke:
    name: Dedicated server smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.vfs.watch=false
    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Eclipse Temurin 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '25'
      - name: Validate the Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Set up Gradle dependency cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Run and inspect dedicated-server smoke
        run: |
          timeout --signal=TERM --kill-after=30s 10m ./gradlew --no-daemon --stacktrace runDedicatedServerSmoke
          bash scripts/ci/check-server-smoke.sh

  external-mod-matrix:
    name: P0 real external-mod matrix
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    uses: ./.github/workflows/external-mod-matrix.yml

  cross-platform-reproducibility:
    name: P0 cross-platform archive reproducibility
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    uses: ./.github/workflows/reproducibility.yml
